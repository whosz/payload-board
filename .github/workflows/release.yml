name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Payload Board ${{ github.ref_name }}
          releaseBody: |
            ## Download

            | File | Description |
            |---|---|
            | `Payload-Board_x.x.x_x64-setup.exe` | Installer (recommended) |
            | `Payload-Board_x.x.x_x64_en-US.msi` | MSI installer |
            | `Payload-Board_x.x.x-portable-x64.zip` | Portable — extract and run, no install needed |

            **Requirements:** Windows 10 or 11 (64-bit)
            Windows may show a SmartScreen warning on first run — click "More info → Run anyway".
          releaseDraft: true
          prerelease: false

      - name: Package and upload portable build
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}"
          $zip = "Payload-Board-${version}-portable-x64.zip"
          Compress-Archive -Path "src-tauri\target\release\payload-board.exe" -DestinationPath $zip
          gh release upload $version $zip
